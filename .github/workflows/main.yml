name: Deploy to S3

on:
  push:
    branches:
      - main  # or your branch name
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Sync to S3
      uses: jakejarvis/s3-sync-action@v0.5.1
      with:
        args: --delete --acl public-read --exclude "*" --include "index.html" --include "script.js" --include "styles.css" --include "images/*" --include "images/**/*"
      env:
        AWS_S3_BUCKET: my-meme-game-prasad
        AWS_REGION: ap-south-1
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        SOURCE_DIR: './'
